version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: nestgate-mosquitto
    restart: unless-stopped
    ports:
      - "8883:8883"
      - "1883:1883"
    volumes:
      - ./deploy/mosquitto/config:/mosquitto/config
      - ./deploy/mosquitto/data:/mosquitto/data
      - ./deploy/mosquitto/log:/mosquitto/log

  server:
    build:
      context: ./server
    container_name: nestgate-server
    restart: unless-stopped
    depends_on:
      - mosquitto
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
